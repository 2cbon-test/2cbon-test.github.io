<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2Cbon — نضيف الـ 2% الفارق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060606;
  --surface:#0E0E0E;
  --surface2:#141414;
  --border:#1C1C1C;
  --gold:#C9A84C;
  --gold-dim:#8A7235;
  --gold-light:#E8C96A;
  --blue:#4D9EFF;
  --text:#F0EDE6;
  --muted:#444;
  --muted2:#888;
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Cairo','Space Grotesk',sans-serif;
  overflow-x:hidden;
  cursor:none;
}
.cursor{width:8px;height:8px;background:var(--gold);border-radius:50%;position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);transition:transform .15s,background .2s;}
.cursor-ring{width:32px;height:32px;border:1px solid var(--gold);opacity:.4;border-radius:50%;position:fixed;z-index:9998;pointer-events:none;transform:translate(-50%,-50%);transition:left .1s,top .1s,opacity .3s,transform .3s;}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;transition:all .4s;}
nav.scrolled{background:rgba(6,6,6,.9);backdrop-filter:blur(20px);padding:1rem 3rem;border-bottom:1px solid var(--border);}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--gold);letter-spacing:-.02em;text-decoration:none;}
.logo span{color:var(--text);opacity:.3;}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{color:var(--muted2);text-decoration:none;font-size:.9rem;font-weight:600;transition:color .3s;letter-spacing:.02em;}
.nav-links a:hover{color:var(--gold);}
.nav-cta{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:.5rem 1.25rem;border-radius:0;font-family:'Cairo',sans-serif;font-size:.85rem;cursor:none;transition:all .3s;font-weight:700;}
.nav-cta:hover{background:var(--gold);color:var(--bg);}
#hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;text-align:center;}
#canvas-bg{position:absolute;inset:0;z-index:0;}
#hero::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:2;}
.hero-content{position:relative;z-index:3;max-width:950px;padding:0 2rem;}
.eyebrow{font-family:'Space Grotesk',sans-serif;font-size:.7rem;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s .2s forwards;}
.hero-title{font-size:clamp(2.2rem,6.5vw,5.5rem);font-weight:900;line-height:1.08;margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s .4s forwards;}
.hero-title .raw{color:var(--muted2);display:block;font-weight:300;font-size:.6em;margin-bottom:.4rem;}
.glitch{position:relative;display:inline-block;color:var(--text);}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;right:0;width:100%;}
.glitch::before{color:var(--blue);clip-path:polygon(0 25%,100% 25%,100% 45%,0 45%);animation:glitch1 5s infinite;}
.glitch::after{color:var(--gold);clip-path:polygon(0 60%,100% 60%,100% 78%,0 78%);animation:glitch2 5s infinite;}
.hero-sub{font-size:clamp(.95rem,2vw,1.15rem);color:var(--muted2);max-width:520px;margin:0 auto 2.5rem;line-height:1.8;opacity:0;animation:fadeUp .8s .6s forwards;}
.hero-actions{display:flex;gap:1rem;justify-content:center;opacity:0;animation:fadeUp .8s .8s forwards;}
.btn-primary{background:var(--gold);color:var(--bg);padding:.85rem 2rem;border:none;font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:700;cursor:none;text-decoration:none;display:inline-block;transition:all .3s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:var(--text);padding:.85rem 2rem;border:1px solid var(--border);font-family:'Cairo',sans-serif;font-size:.95rem;cursor:none;text-decoration:none;display:inline-block;transition:all .3s;font-weight:600;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.hero-scroll{position:absolute;bottom:2rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;color:var(--muted2);font-size:.7rem;opacity:0;animation:fadeUp .8s 1.1s forwards;}
.scroll-line{width:1px;height:50px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2s infinite;}
section{padding:7rem 3rem;position:relative;}
.container{max-width:1200px;margin:0 auto;}
.section-label{font-family:'Space Grotesk',sans-serif;font-size:.68rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;}
.section-title{font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;line-height:1.2;margin-bottom:1.5rem;}
#concept{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
.carbon-wrap{background:var(--surface2);border:1px solid var(--border);padding:2.5rem;position:relative;overflow:hidden;}
.carbon-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .6s;}
.carbon-wrap.lit::before{opacity:1;}
.cb-label{font-family:'Space Grotesk',sans-serif;font-size:.68rem;letter-spacing:.2em;color:var(--muted2);text-transform:uppercase;margin-bottom:1.2rem;}
.cb-track{height:3px;background:var(--border);position:relative;overflow:visible;}
.cb-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width 1.2s cubic-bezier(.4,0,.2,1);position:relative;}
.cb-fill::after{content:'';position:absolute;right:-1px;top:-5px;width:2px;height:13px;background:var(--gold-light);box-shadow:0 0 12px var(--gold);transition:opacity .3s;}
.cb-num{font-family:'Space Grotesk',sans-serif;font-size:4.5rem;font-weight:700;color:var(--gold);line-height:1;margin:1.5rem 0 0;}
.cb-num span{font-size:1.2rem;color:var(--muted2);font-weight:400;}
.cb-status{font-size:.82rem;color:var(--muted2);margin-top:.8rem;font-family:'Space Grotesk',sans-serif;min-height:1.4rem;transition:color .5s;}
.cb-status.done{color:var(--gold);}
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:2rem;}
.ba-box{padding:1.2rem;border:1px solid var(--border);}
.ba-box.after{border-color:var(--gold-dim);}
.ba-tag{font-size:.65rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem;}
.ba-val{font-size:1.05rem;font-weight:700;}
.ba-box.after .ba-val{color:var(--gold);}
#services{background:var(--bg);}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:3rem;}
.service-card{background:var(--surface);border:1px solid var(--border);padding:2.5rem 2rem 4rem;position:relative;overflow:hidden;transition:border-color .35s;cursor:none;}
.service-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 130%,rgba(201,168,76,.09),transparent 65%);opacity:0;transition:opacity .5s;}
.service-card:hover::after{opacity:1;}
.service-card:hover{border-color:var(--gold-dim);}
.s-num{font-family:'Space Grotesk',sans-serif;font-size:.65rem;letter-spacing:.2em;color:var(--muted);margin-bottom:2rem;}
.s-icon{width:48px;height:48px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1.5rem;transition:border-color .3s;}
.service-card:hover .s-icon{border-color:var(--gold-dim);}
.s-title{font-size:1.4rem;font-weight:700;margin-bottom:.7rem;}
.s-desc{color:var(--muted2);font-size:.88rem;line-height:1.75;margin-bottom:1.5rem;}
.s-tags{display:flex;flex-wrap:wrap;gap:.4rem;}
.tag{font-family:'Space Grotesk',sans-serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .7rem;border:1px solid var(--border);color:var(--muted2);transition:border-color .3s;}
.tag.g{border-color:var(--gold-dim);color:var(--gold);}
.s-arrow{position:absolute;bottom:2rem;left:2rem;width:36px;height:36px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted2);transition:all .3s;font-size:.9rem;}
.service-card:hover .s-arrow{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08);}
#stats{background:var(--surface);border-top:1px solid var(--border);padding:5rem 3rem;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2rem;}
.stat{text-align:center;padding:2rem;}
.stat-n{font-family:'Space Grotesk',sans-serif;font-size:3.5rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:.4rem;}
.stat-l{color:var(--muted2);font-size:.88rem;}
#process{background:var(--bg);}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:3.5rem;position:relative;}
.steps::before{content:'';position:absolute;top:24px;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,var(--border) 20%,var(--gold-dim) 50%,var(--border) 80%,transparent);}
.step{padding:0 1.5rem;}
.step-dot{width:48px;height:48px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:.75rem;color:var(--muted2);margin-bottom:1.5rem;background:var(--bg);position:relative;z-index:1;transition:all .3s;letter-spacing:.1em;}
.step:hover .step-dot{border-color:var(--gold);color:var(--gold);}
.step-t{font-size:1rem;font-weight:700;margin-bottom:.5rem;}
.step-d{font-size:.82rem;color:var(--muted2);line-height:1.65;}
#cta{background:var(--surface);border-top:1px solid var(--border);text-align:center;}
.cta-t{font-size:clamp(2rem,5vw,4rem);font-weight:900;margin:0 auto 1rem;max-width:700px;line-height:1.15;}
.cta-t .acc{color:var(--gold);}
.cta-s{color:var(--muted2);margin-bottom:2.5rem;font-size:1.05rem;}
footer{padding:2rem 3rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--muted2);}
footer .fl{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--gold);}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s ease,transform .8s ease;}
.reveal.visible{opacity:1;transform:none;}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
@keyframes glitch1{0%,88%,100%{transform:none;opacity:0;}90%{transform:translateX(-4px);opacity:.9;}92%{transform:translateX(4px);opacity:0;}95%{transform:translateX(-2px);opacity:.6;}}
@keyframes glitch2{0%,86%,100%{transform:none;opacity:0;}88%{transform:translateX(4px);opacity:.8;}90%{transform:translateX(-4px);opacity:0;}93%{transform:translateX(2px);opacity:.5;}}
@keyframes scrollPulse{0%,100%{opacity:.5;transform:scaleY(.8);}50%{opacity:1;transform:scaleY(1);}}
@media(max-width:768px){
  nav{padding:1rem 1.5rem;}nav.scrolled{padding:.8rem 1.5rem;}
  .nav-links,.nav-cta{display:none;}
  section{padding:4rem 1.5rem;}
  .concept-grid,.services-grid,.steps,.stats-grid{grid-template-columns:1fr;gap:1.5rem;}
  .steps::before{display:none;}
  .hero-actions{flex-direction:column;align-items:center;}
  footer{flex-direction:column;gap:1rem;text-align:center;}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<nav id="navbar">
  <a href="#" class="logo">2C<span>bon</span></a>
  <ul class="nav-links">
    <li><a href="#services">الخدمات</a></li>
    <li><a href="#process">كيف نشتغل</a></li>
    <li><a href="#stats">أرقامنا</a></li>
  </ul>
  <button class="nav-cta" onclick="document.getElementById('cta').scrollIntoView({behavior:'smooth'})">تواصل معنا</button>
</nav>

<section id="hero">
  <canvas id="canvas-bg"></canvas>
  <div class="hero-content">
    <p class="eyebrow">Media Production Agency — Cairo</p>
    <h1 class="hero-title">
      <span class="raw">المادة الخام ممكن تكون ممتازة،</span>
      <span class="glitch" data-text="بس ممكن ماتعملش تأثير">بس ممكن ماتعملش تأثير</span>
    </h1>
    <p class="hero-sub">بنضيف الـ 2% اللي بتحوّل الحديد لفولاذ — مونتاج، موشن جرافيك، وAI Video بيستحوذ على الشاشات</p>
    <div class="hero-actions">
      <a href="#services" class="btn-primary">شوف خدماتنا</a>
      <a href="#cta" class="btn-ghost">ابدأ مش
